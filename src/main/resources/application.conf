# In-JVM Jlama (no-key path) does synchronous CPU inference inside the /api/remember
# request — that can take tens of seconds. Raise the HTTP request/idle timeouts well
# above the ~20s/60s defaults so the local round-trip completes instead of being cut off.
akka.http {
  server {
    request-timeout = 600s
    idle-timeout = 620s
  }
  client.idle-timeout = 600s
  host-connection-pool {
    idle-timeout = 600s
    client.idle-timeout = 600s
  }
}

akka.javasdk {
  agent {
    model-provider = googleai-gemini

    googleai-gemini {
      model-name = "gemini-2.5-flash"
      api-key = ${?GOOGLE_AI_GEMINI_API_KEY}
      temperature = 0.2
      max-output-tokens = 4096
      # Disable "thinking" for faster, cheaper extraction/answering in this demo.
      thinking-budget = 0
    }
  }
}
