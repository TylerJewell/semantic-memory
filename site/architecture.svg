<svg viewBox="0 0 880 720" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-labelledby="arch-title arch-desc">
  <title id="arch-title">semantic-memory architecture</title>
  <desc id="arch-desc">Two kinds of input. Facts you state in curated files are kept as-is with no
    AI (authored, fully trusted). Documents are read by AI to extract facts (derived, lower trust).
    Both become labeled facts in one store; when they disagree, stated facts win over extracted
    ones. All reading back is exact and rule-based, with no AI.</desc>
  <style>
    svg { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          --fg:#1a1a1a; --muted:#5a5a5a; --line:#cfcfcf; --box:#f6f6f4; --store:#eef1f4;
          --llm:#b45309; --llmbg:#fdf1e2; --edge:#8a8a8a; }
    @media (prefers-color-scheme: dark) {
      svg { --fg:#e6e6e6; --muted:#9a9a9a; --line:#3a3a3a; --box:#181818; --store:#141a20;
            --llm:#f59e0b; --llmbg:#2a1f10; --edge:#888; }
    }
    .hdr  { fill:var(--muted); font-size:11px; letter-spacing:1.5px; }
    .lbl  { fill:var(--fg); font-size:13px; }
    .sub  { fill:var(--muted); font-size:11px; }
    .layer{ fill:var(--fg); font-size:11px; font-weight:600; }
    .mono { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; fill:var(--fg); }
    .tag  { font-size:10px; letter-spacing:.5px; }
    .box  { fill:var(--box); stroke:var(--line); stroke-width:1; }
    .llmbox { fill:var(--llmbg); stroke:var(--llm); stroke-width:1.5; }
    .store{ fill:var(--store); stroke:var(--line); stroke-width:1; }
    .edge { stroke:var(--edge); stroke-width:1.4; fill:none; marker-end:url(#a); }
    .bar  { stroke:var(--edge); stroke-width:1.4; fill:none; }
    .llmt { fill:var(--llm); }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--edge)"/>
    </marker>
  </defs>

  <!-- legend -->
  <rect x="40" y="12" width="15" height="11" class="llmbox"/>
  <text x="61" y="22" class="sub"><tspan class="llmt" font-weight="600">AI</tspan> — reads documents, at ingest only</text>
  <rect x="360" y="12" width="15" height="11" class="box"/>
  <text x="381" y="22" class="sub"><tspan fill="var(--muted)" font-weight="600">No AI</tspan> — exact, rule-based</text>

  <!-- TWO KINDS OF INPUT -->
  <text x="40" y="56" class="hdr">TWO KINDS OF INPUT</text>

  <!-- LEFT lane: authored / stated -->
  <text x="220" y="80" text-anchor="middle" class="mono">curated files &#8594; /sync</text>
  <rect x="70" y="92" width="300" height="74" rx="6" class="box"/>
  <text x="220" y="120" text-anchor="middle" class="lbl">Facts you state</text>
  <text x="220" y="139" text-anchor="middle" class="sub">kept exactly as written — no AI</text>
  <text x="220" y="186" text-anchor="middle" class="layer">AUTHORED — fully trusted</text>

  <!-- RIGHT lane: derived / extracted -->
  <text x="660" y="80" text-anchor="middle" class="mono">your text &#8594; /remember  ·  documents &#8594; /sync</text>
  <rect x="510" y="92" width="300" height="74" rx="6" class="llmbox"/>
  <text x="660" y="120" text-anchor="middle" class="lbl">Facts AI extracts</text>
  <text x="660" y="139" text-anchor="middle" class="sub">AI reads the document, pulls out facts</text>
  <text x="796" y="109" text-anchor="end" class="tag llmt" font-weight="600">AI</text>
  <text x="660" y="186" text-anchor="middle" class="layer">DERIVED — lower trust</text>

  <!-- converge -->
  <path class="bar" d="M220 166 L220 200 L436 200"/>
  <path class="bar" d="M660 166 L660 200 L444 200"/>
  <path class="edge" d="M440 200 L440 214"/>

  <rect x="250" y="216" width="380" height="60" rx="6" class="box"/>
  <text x="440" y="240" text-anchor="middle" class="lbl">Match up entities</text>
  <text x="440" y="259" text-anchor="middle" class="sub">link "Acme" and "Acme Corp" as one thing</text>

  <path class="edge" d="M440 276 L440 302"/>

  <rect x="250" y="304" width="380" height="60" rx="6" class="box"/>
  <text x="440" y="328" text-anchor="middle" class="lbl">Check against what's known</text>
  <text x="440" y="347" text-anchor="middle" class="sub">add · confirm a match · flag a conflict — never drop a fact</text>

  <path class="edge" d="M440 364 L440 406"/>
  <text x="452" y="388" class="sub">store</text>

  <!-- WHERE IT'S STORED -->
  <text x="40" y="400" class="hdr">WHERE IT'S STORED</text>
  <rect x="40" y="408" width="800" height="82" rx="6" class="store"/>
  <text x="440" y="438" text-anchor="middle" class="lbl">One store — every fact labeled by where it came from</text>
  <text x="440" y="461" text-anchor="middle" class="sub">stated (curated) or extracted (from a document), with its source, trust level,</text>
  <text x="440" y="478" text-anchor="middle" class="sub">and the full history of who said what, when</text>

  <!-- fan-out -->
  <path class="bar" d="M440 490 L440 512 M142 512 L760 512"/>
  <path class="edge" d="M142 512 L142 540"/>
  <path class="edge" d="M362 512 L362 540"/>
  <path class="edge" d="M575 512 L575 540"/>
  <path class="edge" d="M760 512 L760 540"/>

  <!-- GETTING ANSWERS OUT -->
  <text x="40" y="528" class="hdr">GETTING ANSWERS OUT — no AI</text>

  <rect x="50" y="542" width="184" height="60" rx="6" class="box"/>
  <text x="142" y="566" text-anchor="middle" class="mono">GET /fact</text>
  <text x="142" y="584" text-anchor="middle" class="sub">the agreed value + its source</text>

  <rect x="254" y="542" width="216" height="60" rx="6" class="box"/>
  <text x="362" y="566" text-anchor="middle" class="mono">GET /disagreements</text>
  <text x="362" y="584" text-anchor="middle" class="sub">where sources disagree — curated wins</text>

  <rect x="490" y="542" width="170" height="60" rx="6" class="box"/>
  <text x="575" y="566" text-anchor="middle" class="mono">GET /conflicts</text>
  <text x="575" y="584" text-anchor="middle" class="sub">ties a person must settle</text>

  <rect x="680" y="542" width="160" height="60" rx="6" class="box"/>
  <text x="760" y="566" text-anchor="middle" class="mono">GET /stats · /recent</text>
  <text x="760" y="584" text-anchor="middle" class="sub">counts · recent facts</text>

  <!-- converge to winner -->
  <path class="bar" d="M142 602 L142 616 M362 602 L362 616 M575 602 L575 616 M760 602 L760 616 M142 616 L760 616"/>
  <path class="edge" d="M440 616 L440 622"/>

  <rect x="210" y="624" width="460" height="56" rx="6" class="box"/>
  <text x="440" y="648" text-anchor="middle" class="lbl">When facts disagree, how the winner is chosen</text>
  <text x="440" y="667" text-anchor="middle" class="sub">stated beats extracted, then more-trusted source, then confidence, then newest</text>
</svg>
